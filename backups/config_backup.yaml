interface: enp0s1

logs:
  auth_log: /var/log/auth.log
  suricata_log: /var/log/suricata/eve.json
  output_file: logs/enriched_alerts.json
  response_log: response/response_log.txt

threat_intel:
  abuseipdb_enabled: true
  abuseipdb_api_key: "95e8e0925821169747e96bc4070e1274f498714cebb677a777e1197041597f525400ebaa13a56af0 "
  max_age_days: 90

response:
  auto_block: true
  block_threshold: 85
  allowlist:
    - 127.0.0.1
    - 192.168.64.6

correlation:
  window_seconds: 60

deduplication:
  window_seconds: 15

lab:
  known_lab_ips:
    - 127.0.0.1
    - 192.168.64.6
    - 192.168.1.10
